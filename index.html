        {id:"s6",text:"Dificuldade para dormir pela dor",options:["Nenhuma","Pouca","Moderada","Muita","Incapaz de dormir"],scores:[1,2,3,4,5]},

    ],
    calculate:(a)=>{const v=Object.values(a);const n=v.length;if(!n)return 0;return Math.round(((v.reduce((s,x)=>s+x,0)/n)-1)*25);},
    renderResult:(r)=><SingleScore value={r} label="Escore DASH" color={C.yellow} info="0–100 pts. Quanto maior, maior a incapacidade." invert/>
  },
  startback:{
    id:"startback", name:"STarT Back", region:"Coluna", color:C.red, icon:"🩻",
    description:"STarT Back Screening Tool — triagem de prognóstico para dor lombar.",
    score_info:"Total 0–9 pts. Psicossocial 0–5. Classifica: Baixo / Médio / Alto risco.",
    sections:[
      {title:"Últimos 14 dias", questions:[
        {id:"q1",text:"Minha dor nas costas se espalhou para a(s) perna(s) pelo menos uma vez",options:["Concordo","Discordo"],scores:[1,0]},
        {id:"q2",text:"Tive dor no ombro ou no pescoço pelo menos uma vez",options:["Concordo","Discordo"],scores:[1,0]},
        {id:"q3",text:"Só tenho caminhado pequenas distâncias por causa das costas",options:["Concordo","Discordo"],scores:[1,0]},
        {id:"q4",text:"Me vesti mais devagar do que o habitual pelas costas",options:["Concordo","Discordo"],scores:[1,0]},
        {id:"q5",text:"Não é seguro para mim ser fisicamente ativo(a) com essa condição",options:["Concordo","Discordo"],scores:[1,0]},
        {id:"q6",text:"Pensamentos preocupantes têm passado pela minha cabeça constantemente",options:["Concordo","Discordo"],scores:[1,0]},
        {id:"q7",text:"Sinto que minha dor nas costas é terrível e nunca vai melhorar",options:["Concordo","Discordo"],scores:[1,0]},
        {id:"q8",text:"Em geral, não tenho aproveitado as coisas boas da vida",options:["Concordo","Discordo"],scores:[1,0]},
        {id:"q9",text:"A dor nas costas me incomodou nas últimas 2 semanas",options:["Nada","Pouco","Moderadamente","Muito","Extremamente"],scores:[0,0,0,0,1]},
      ]},
    ],
    calculate:(a)=>{
      const psy=["q5","q6","q7","q8","q9"];
      const total=Object.values(a).reduce((s,v)=>s+v,0);
      const ps=psy.reduce((s,k)=>s+(a[k]??0),0);
      let risk="Baixo";if(total>=4&&ps>=4)risk="Alto";else if(total>=4)risk="Médio";
      return{total,psychosocial:ps,risk};
    },
    renderResult:(r)=>{
      const rc=r.risk==="Baixo"?C.green:r.risk==="Médio"?C.yellow:C.red;
      return(<div style={{textAlign:"center"}}><div style={{display:"inline-block",background:`${rc}22`,border:`2px solid ${rc}`,borderRadius:16,padding:"18px 36px",marginBottom:16}}><div style={{fontFamily:"Syne,sans-serif",fontSize:30,fontWeight:800,color:rc}}>Risco {r.risk}</div></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><div style={{background:C.navyLight,borderRadius:12,padding:16}}><div style={{fontFamily:"Syne,sans-serif",fontSize:28,fontWeight:700}}>{r.total}<span style={{fontSize:14,color:C.gray400}}>/9</span></div><div style={{color:C.gray400,fontSize:12}}>Total</div></div><div style={{background:C.navyLight,borderRadius:12,padding:16}}><div style={{fontFamily:"Syne,sans-serif",fontSize:28,fontWeight:700}}>{r.psychosocial}<span style={{fontSize:14,color:C.gray400}}>/5</span></div><div style={{color:C.gray400,fontSize:12}}>Psicossocial</div></div></div></div>);
    }
  }
};

const QuestionnaireForm = ({qId,patientName,onDone,onBack}) => {
  const q = QS[qId];
  const [answers,setAnswers] = useState({});
  const [sec,setSec] = useState(0);
  const allQs = q.sections.flatMap(s=>s.questions);
  const answered = Object.keys(answers).length;
  const section = q.sections[sec];
  const secDone = section.questions.every(x=>answers[x.id]!==undefined);
  const allDone = allQs.every(x=>answers[x.id]!==undefined);
  const progress = (answered/allQs.length)*100;
  const result = allDone ? q.calculate(answers) : null;

  if(allDone && result!==null) return (
    <div>
      <div style={{textAlign:"center",marginBottom:24}}>
        <div style={{fontSize:40,marginBottom:8}}>✅</div>
        <h3 style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:20,marginBottom:4}}>Questionário concluído</h3>
        <p style={{color:C.gray400,fontSize:13}}>{patientName} • {q.name} • {new Date().toLocaleDateString("pt-BR")}</p>

      <div style={{background:C.navy,borderRadius:16,padding:24,marginBottom:20}}>{q.renderResult(result)}</div>
      <div style={{background:`${q.color}11`,border:`1px solid ${q.color}22`,borderRadius:12,padding:14,marginBottom:20}}>
        <p style={{color:q.color,fontSize:12,fontWeight:600,marginBottom:2}}>ℹ️ Interpretação</p>
        <p style={{color:C.gray200,fontSize:12}}>{q.score_info}</p>
      </div>
      <div style={{display:"flex",gap:10}}>
        <Btn onClick={onBack} variant="ghost" full>← Voltar</Btn>
        <Btn onClick={()=>onDone(result)} full>💾 Salvar resultado</Btn>
      </div>
    </div>
  );

  return (
    <div>
      <div style={{marginBottom:18}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <span style={{color:q.color,fontWeight:600,fontSize:13}}>{section.title}</span>
          <span style={{color:C.gray400,fontSize:12}}>{answered}/{allQs.length}</span>
        </div>
        <div style={{background:C.navyLight,borderRadius:999,height:4}}>
          <div style={{width:`${progress}%`,height:"100%",background:q.color,borderRadius:999,transition:"width .3s"}}/>
        </div>
        {q.sections.length>1&&<div style={{display:"flex",gap:6,marginTop:8}}>{q.sections.map((s,i)=><div key={i} style={{height:3,flex:1,background:i<sec?q.color:i===sec?`${q.color}66`:C.navyLight,borderRadius:999}}/>)}</div>}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12,maxHeight:"52vh",overflowY:"auto",paddingRight:4}}>
        {section.questions.map((ques,qi)=>(
          <div key={ques.id} style={{background:C.navy,border:`1.5px solid ${answers[ques.id]!==undefined?q.color+"55":C.navyLight}`,borderRadius:14,padding:16,transition:"border-color .2s"}}>
            <p style={{fontSize:13,lineHeight:1.6,marginBottom:12}}><span style={{color:q.color,fontWeight:700,marginRight:6}}>{qi+1}.</span>{ques.text}</p>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {ques.options.map((opt,oi)=>{
                const sel=answers[ques.id]===ques.scores[oi];
                return <button key={oi} onClick={()=>setAnswers(p=>({...p,[ques.id]:ques.scores[oi]}))} style={{background:sel?`${q.color}22`:C.navyMid,border:`1.5px solid ${sel?q.color:C.navyLight}`,borderRadius:8,padding:"8px 14px",color:sel?q.color:C.gray200,fontSize:12,fontFamily:"DM Sans,sans-serif",cursor:"pointer",textAlign:"left",transition:"all .15s",fontWeight:sel?600:400}}>{opt}</button>;

        {sec>0&&<Btn onClick={()=>setSec(s=>s-1)} variant="ghost">←</Btn>}
        <div style={{flex:1}}/>
        {sec<q.sections.length-1?<Btn onClick={()=>setSec(s=>s+1)} disabled={!secDone}>Próxima seção →</Btn>:<Btn disabled={!allDone} style={{opacity:allDone?1:.4}}>Ver resultado ✓</Btn>}
      </div>
    </div>
  );
};

// ─── AI SUGGESTION ────────────────────────────────────────────────────────────
const AISuggestion = ({onSelectQ}) => {
  const [diagnosis,setDiagnosis] = useState("");
  const [loading,setLoading] = useState(false);
  const [result,setResult] = useState(null);
  const [error,setError] = useState("");

  const suggest = async () => {
    if(!diagnosis.trim()) return setError("Descreva o diagnóstico ou queixa principal.");
    setLoading(true); setError(""); setResult(null);
    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          messages:[{role:"user",content:`Você é um fisioterapeuta especialista em avaliação funcional ortopédica e esportiva.
Com base no diagnóstico ou queixa descrita, sugira o questionário funcional mais adequado entre os disponíveis no app FisioQ.

Questionários disponíveis:
- IKDC Subjetivo (Joelho): lesões ligamentares, meniscais, LCA, condropatia
- Lysholm (Joelho): lesões ligamentares, instabilidade, menisco
- WOMAC (Quadril): osteoartrite de quadril e joelho
- FAAM (Tornozelo/Pé): condições musculoesqueléticas gerais do tornozelo e pé
- FFI-R (Tornozelo/Pé): dor e incapacidade do pé (fasciopatia plantar, metatarsalgia)
- FHSQ (Tornozelo/Pé): saúde geral do pé, qualidade de vida
- DASH (Membros Superiores): ombro, cotovelo, punho, mão
- STarT Back (Coluna): dor lombar, triagem de risco de cronificação

Diagnóstico/queixa: ${diagnosis}

Responda APENAS em JSON válido, sem texto fora do JSON:
{"questionario":"ID_DO_QUESTIONARIO","nome":"Nome do questionário","justificativa":"Explicação em 2-3 frases por que este questionário é o mais indicado para este caso","alternativo":"ID_ALTERNATIVO_SE_HOUVER_OU_null"}

IDs válidos: ikdc, lysholm, womac, faam, ffir, fhsq, dash, startback`}]
        })
      });
      const data = await resp.json();
      const text = data.content?.[0]?.text || "";
      const clean = text.replace(/```json|```/g,"").trim();
      const parsed = JSON.parse(clean);
      setResult(parsed);
    } catch(e){ setError("Erro ao consultar a IA. Tente novamente."); }
    setLoading(false);
  };

  const inp = {background:C.navyLight,border:`1px solid ${C.navyLight}`,borderRadius:10,padding:"12px 16px",color:C.white,fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",width:"100%",resize:"vertical",minHeight:80};

  return (
    <div style={{maxWidth:600,margin:"0 auto",padding:"20px 16px"}}>
      <div className="fu" style={{background:C.navyMid,border:`1px solid ${C.navyLight}`,borderRadius:18,padding:24,marginBottom:20}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
          <div style={{width:44,height:44,borderRadius:12,background:`${C.orange}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🤖</div>
          <div>
            <h2 style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:18}}>Sugestão por IA</h2>
            <p style={{color:C.gray400,fontSize:13}}>Descreva o diagnóstico e a IA sugere o questionário ideal</p>
          </div>
        </div>
        <Alert msg={error}/>
        <textarea style={inp} placeholder="Ex: Paciente com diagnóstico de ruptura do LCA, pós-operatório de reconstrução ligamentar há 3 meses..." value={diagnosis} onChange={e=>setDiagnosis(e.target.value)}/>
        <Btn onClick={suggest} loading={loading} full style={{marginTop:12}}>🔍 Sugerir questionário</Btn>
      </div>

      {result&&(
        <div className="fu" style={{background:C.navyMid,border:`1px solid ${C.orange}44`,borderRadius:18,padding:24}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <span style={{background:`${C.orange}22`,color:C.orange,borderRadius:999,padding:"4px 12px",fontSize:12,fontWeight:700}}>✨ Recomendação da IA</span>
          </div>
          <div style={{background:C.navy,borderRadius:14,padding:18,marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
              <span style={{fontSize:28}}>{QS[result.questionario]?.icon}</span>
              <div>
                <div style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:18,color:QS[result.questionario]?.color||C.orange}}>{result.nome}</div>
                <div style={{color:C.gray400,fontSize:12}}>{QS[result.questionario]?.region}</div>
              </div>
            </div>
            <p style={{color:C.gray200,fontSize:13,lineHeight:1.7}}>{result.justificativa}</p>
          </div>
          <Btn onClick={()=>onSelectQ(result.questionario)} full>📋 Abrir este questionário</Btn>
          {result.alternativo&&result.alternativo!=="null"&&QS[result.alternativo]&&(
            <div style={{marginTop:12,padding:"12px 16px",background:C.navyLight,borderRadius:10}}>
              <p style={{color:C.gray400,fontSize:12,marginBottom:6}}>Alternativa sugerida:</p>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span style={{color:C.white,fontSize:13}}>{QS[result.alternativo]?.icon} {QS[result.alternativo]?.name}</span>
                <Btn onClick={()=>onSelectQ(result.alternativo)} variant="ghost" size="sm">Abrir →</Btn>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
};

// ─── PATIENT PROFILE ──────────────────────────────────────────────────────────
const PatientProfile = ({patient,profId,onBack,onSaveEval}) => {
  const [modal,setModal] = useState(null);
  const [selectedQ,setSelectedQ] = useState(null);
  const [linkData,setLinkData] = useState(null);
  const [copied,setCopied] = useState(false);
  const [saving,setSaving] = useState(false);

  const generateLink = (qId) => {
    const token = Math.random().toString(36).slice(2,10).toUpperCase();
    setLinkData({link:`https://flcerqueira-boop.github.io/FisioQ?token=${token}&q=${qId}&p=${encodeURIComponent(patient.name)}`,q:qId});
  };

  const handleSaveEval = async (qId,result) => {
    setSaving(true);
    try {
      const {addDoc,collection} = fbFns();
      const scoreStr = typeof result==="object"&&result.avd!==undefined?`AVD ${result.avdPct}% / Esp ${result.sportPct}%`:typeof result==="object"&&result.risk!==undefined?`Risco ${result.risk} (${result.total}/9)`:typeof result==="object"&&result.dor!==undefined?`Dor:${result.dor} Inc:${result.inc} Total:${result.total}`:typeof result==="object"&&result.func!==undefined?`Total:${result.total}`:typeof result==="number"?`${result} pts`:`${result} pts`;
      await addDoc(collection(fbDb(),"evaluations"),{profId,patientId:patient.id,patientName:patient.name,questionnaire:qId,result,scoreStr,date:new Date().toLocaleDateString("pt-BR"),createdAt:new Date().toISOString()});
      onSaveEval(patient.id,qId,scoreStr);
    } catch(e){console.error(e);}
    setSaving(false); setModal(null); setSelectedQ(null);
  };

  const inp = {background:C.navyLight,border:`1px solid ${C.navyLight}`,borderRadius:9,padding:"10px 14px",color:C.white,fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",width:"100%"};

  return (
    <div style={{minHeight:"100vh",background:C.navy}}>
      <div style={{background:C.navyMid,borderBottom:`1px solid ${C.navyLight}`,padding:"14px 20px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.gray400,cursor:"pointer",fontSize:22}}>←</button>
        <Logo size={24}/>
      </div>
      <div style={{maxWidth:700,margin:"0 auto",padding:"20px 16px"}}>
        <div className="fu" style={{background:C.navyMid,border:`1px solid ${C.navyLight}`,borderRadius:18,padding:24,marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:18}}>
            <div style={{width:52,height:52,borderRadius:14,background:`${C.orange}22`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:22,color:C.orange,flexShrink:0}}>{patient.name[0]}</div>
            <div>
              <h2 style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:20}}>{patient.name}</h2>
              <p style={{color:C.gray400,fontSize:13}}>{patient.age} anos • {patient.gender==="F"?"Feminino":"Masculino"} • {patient.condition}</p>
            </div>
          </div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <Btn onClick={()=>{setSelectedQ(null);setModal("apply");}}>📋 Aplicar questionário</Btn>
            <Btn onClick={()=>{setLinkData(null);setModal("link");}} variant="dark">🔗 Gerar link para paciente</Btn>
          </div>
        </div>
        <div className="fu2">
          <h3 style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:16,marginBottom:12}}>Histórico de Avaliações</h3>
          {(!patient.evals||patient.evals.length===0)?<div style={{background:C.navyMid,border:`1px solid ${C.navyLight}`,borderRadius:14,padding:28,textAlign:"center",color:C.gray400,fontSize:13}}>Nenhuma avaliação registrada ainda.</div>:
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {patient.evals.map((ev,i)=>{
              const q=QS[ev.q];
              return <div key={i} style={{background:C.navyMid,border:`1px solid ${C.navyLight}`,borderRadius:14,padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <span style={{fontSize:22}}>{q?.icon}</span>
                  <div><div style={{fontWeight:600,fontSize:14}}>{q?.name}</div><div style={{color:C.gray400,fontSize:12}}>{ev.date}</div></div>
                </div>
                <Badge color={q?.color||C.orange}>{ev.score}</Badge>
              </div>;
            })}
          </div>}
        </div>
      </div>

      {modal==="apply"&&(
        <Modal title={selectedQ?"Aplicando: "+QS[selectedQ]?.name:"Selecionar questionário"} onClose={()=>{setModal(null);setSelectedQ(null);}}>
          {!selectedQ?<>
            <p style={{color:C.gray400,fontSize:13,marginBottom:16}}>Selecione para <strong style={{color:C.white}}>{patient.name}</strong>:</p>
            {JOINTS.map(j=>(
              <div key={j.id} style={{marginBottom:12}}>
                <p style={{color:C.gray400,fontSize:11,fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>{j.icon} {j.label}</p>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {j.qs.map(qid=>{const q=QS[qid];return <div key={qid} onClick={()=>setSelectedQ(qid)} style={{background:C.navy,border:`1.5px solid ${q.color}33`,borderRadius:10,padding:"12px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,transition:"border-color .2s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=q.color} onMouseLeave={e=>e.currentTarget.style.borderColor=`${q.color}33`}><span style={{fontSize:18}}>{q.icon}</span><div><div style={{fontWeight:600,fontSize:13,color:q.color}}>{q.name}</div><div style={{color:C.gray400,fontSize:11}}>{q.sections.flatMap(s=>s.questions).length} questões</div></div><span style={{marginLeft:"auto",color:C.gray400}}>→</span></div>;})}
                </div>
              </div>
            ))}
          </>:<QuestionnaireForm qId={selectedQ} patientName={patient.name} onBack={()=>setSelectedQ(null)} onDone={(result)=>handleSaveEval(selectedQ,result)}/>}
        </Modal>
      )}

      {modal==="link"&&(
        <Modal title="Gerar link para o paciente" onClose={()=>{setModal(null);setLinkData(null);}}>
          {!linkData?<>
            <p style={{color:C.gray400,fontSize:13,marginBottom:16}}>Qual questionário <strong style={{color:C.white}}>{patient.name}</strong> deve responder?</p>
            {JOINTS.map(j=>(
              <div key={j.id} style={{marginBottom:12}}>
                <p style={{color:C.gray400,fontSize:11,fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>{j.icon} {j.label}</p>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {j.qs.map(qid=>{const q=QS[qid];return <div key={qid} onClick={()=>generateLink(qid)} style={{background:C.navy,border:`1.5px solid ${q.color}33`,borderRadius:10,padding:"12px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,transition:"border-color .2s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=q.color} onMouseLeave={e=>e.currentTarget.style.borderColor=`${q.color}33`}><span style={{fontSize:18}}>{q.icon}</span><div style={{fontWeight:600,fontSize:13,color:q.color}}>{q.name}</div><span style={{marginLeft:"auto",color:C.gray400}}>→</span></div>;})}
              </div>
            ))}
          </>:<>
            <div style={{background:`${C.green}11`,border:`1px solid ${C.green}44`,borderRadius:12,padding:16,marginBottom:16,textAlign:"center"}}>
              <div style={{fontSize:32,marginBottom:8}}>🔗</div>
              <p style={{color:C.green,fontWeight:600,fontSize:14,marginBottom:4}}>Link gerado!</p>
              <p style={{color:C.gray400,fontSize:12}}>{QS[linkData.q]?.name} • {patient.name}</p>
            </div>
            <div style={{background:C.navy,borderRadius:10,padding:12,marginBottom:12}}><span style={{color:C.gray400,fontSize:11,wordBreak:"break-all",fontFamily:"monospace"}}>{linkData.link}</span></div>
            <Btn onClick={()=>{navigator.clipboard?.writeText(linkData.link).catch(()=>{});setCopied(true);setTimeout(()=>setCopied(false),2000);}} full style={{marginBottom:12}}>{copied?"✅ Copiado!":"📋 Copiar link"}</Btn>
            <div style={{background:`${C.yellow}11`,border:`1px solid ${C.yellow}33`,borderRadius:10,padding:12,marginBottom:12}}>
              <p style={{color:C.yellow,fontSize:12,fontWeight:600,marginBottom:4}}>ℹ️ Como funciona</p>
              <p style={{color:C.gray400,fontSize:12,lineHeight:1.6}}>Envie por WhatsApp ou SMS. O paciente abre no celular, responde e o resultado é registrado automaticamente.</p>
            </div>
            <Btn onClick={()=>setLinkData(null)} variant="ghost" full>← Gerar outro link</Btn>
          </>}
        </Modal>
      )}
    </div>
  );
};

// ─── DASHBOARD ─────────────────────────────────────────────────────────────────
const Dashboard = ({user,role,onLogout}) => {
  const [tab,setTab] = useState("pacientes"); // pacientes | ia | ortoflix
  const [patients,setPatients] = useState([]);
  const [search,setSearch] = useState("");
  const [selectedPatient,setSelectedPatient] = useState(null);
  const [showAddModal,setShowAddModal] = useState(false);
  const [newP,setNewP] = useState({name:"",age:"",gender:"F",condition:""});
  const [loading,setLoading] = useState(true);
  const [saving,setSaving] = useState(false);
  const [pendingUsers,setPendingUsers] = useState([]);
  const [approvingId,setApprovingId] = useState(null);
  const [aiSelectedQ,setAiSelectedQ] = useState(null);

  useEffect(()=>{loadPatients();},[]);

  const loadPatients = async () => {
    setLoading(true);
    try {
      const {collection,getDocs,query,where} = fbFns();
      const q = role==="admin"?query(collection(fbDb(),"patients")):query(collection(fbDb(),"patients"),where("profId","==",user.uid));
      const snap = await getDocs(q);
      setPatients(snap.docs.map(d=>({id:d.id,...d.data(),evals:d.data().evals||[]})));
      if(role==="admin") loadPendingUsers();
    } catch(e){console.error(e);}
    setLoading(false);
  };

  const loadPendingUsers = async () => {
    try {
      const {collection,getDocs,query,where} = fbFns();
      const q = query(collection(fbDb(),"users"),where("status","==","pending"));
      const snap = await getDocs(q);
      setPendingUsers(snap.docs.map(d=>({id:d.id,...d.data()})));
    } catch(e){console.error(e);}
  };

  const approveUser = async (uid) => {
    setApprovingId(uid);
    try {
      const {doc,setDoc} = fbFns();
      await setDoc(doc(fbDb(),"users",uid),{status:"approved"},{merge:true});
      const u = pendingUsers.find(p=>p.id===uid);
      if(u?.email){
        try { await emailjs.send("service_tm0udfi","template_hxr1raj",{to_name:u.name||"Profissional",email:u.email}); } catch(e){console.error(e);}
      }
      setPendingUsers(ps=>ps.filter(p=>p.id!==uid));
    } catch(e){console.error(e);}
    setApprovingId(null);
  };

  const rejectUser = async (uid) => {
    setApprovingId(uid);
    try {
      const {doc,setDoc} = fbFns();
      await setDoc(doc(fbDb(),"users",uid),{status:"rejected"},{merge:true});
      setPendingUsers(ps=>ps.filter(p=>p.id!==uid));
    } catch(e){console.error(e);}
    setApprovingId(null);
  };

  const addPatient = async () => {
    if(!newP.name.trim()) return;
    setSaving(true);
    try {
      const {addDoc,collection} = fbFns();
      const ref = await addDoc(collection(fbDb(),"patients"),{name:newP.name,age:parseInt(newP.age)||0,gender:newP.gender,condition:newP.condition,profId:user.uid,evals:[],createdAt:new Date().toISOString()});
      setPatients(ps=>[...ps,{id:ref.id,name:newP.name,age:parseInt(newP.age)||0,gender:newP.gender,condition:newP.condition,profId:user.uid,evals:[]}]);
      setNewP({name:"",age:"",gender:"F",condition:""}); setShowAddModal(false);
    } catch(e){console.error(e);}
    setSaving(false);
  };

  const saveEval = async (patientId,qId,scoreStr) => {
    const eval_ = {date:new Date().toLocaleDateString("pt-BR"),q:qId,score:scoreStr};
    try {
      const {doc,getDoc,setDoc} = fbFns();
      const ref = doc(fbDb(),"patients",patientId);
      const snap = await getDoc(ref);
      if(snap.exists()) await setDoc(ref,{evals:[eval_,...(snap.data().evals||[])]},{merge:true});
    } catch(e){console.error(e);}
    setPatients(ps=>ps.map(p=>p.id===patientId?{...p,evals:[eval_,...(p.evals||[])]}:p));
    if(selectedPatient?.id===patientId) setSelectedPatient(p=>({...p,evals:[eval_,...(p.evals||[])]}));
  };

  if(selectedPatient) return <PatientProfile patient={selectedPatient} profId={user.uid} onBack={()=>setSelectedPatient(null)} onSaveEval={saveEval}/>;

  // AI selected Q — open form for a patient
  if(aiSelectedQ) return (
    <div style={{minHeight:"100vh",background:C.navy}}>
      <div style={{background:C.navyMid,borderBottom:`1px solid ${C.navyLight}`,padding:"14px 20px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={()=>setAiSelectedQ(null)} style={{background:"none",border:"none",color:C.gray400,cursor:"pointer",fontSize:22}}>←</button>
        <Logo size={24}/>
      </div>
      <div style={{maxWidth:600,margin:"0 auto",padding:"20px 16px"}}>
        <Modal title={`Aplicar: ${QS[aiSelectedQ]?.name}`} onClose={()=>setAiSelectedQ(null)}>
          <QuestionnaireForm qId={aiSelectedQ} patientName="Paciente" onBack={()=>setAiSelectedQ(null)} onDone={()=>setAiSelectedQ(null)}/>
        </Modal>
      </div>
    </div>
  );

  const filtered = patients.filter(p=>p.name?.toLowerCase().includes(search.toLowerCase())||p.condition?.toLowerCase().includes(search.toLowerCase()));
  const inp = {background:C.navyLight,border:`1px solid ${C.navyLight}`,borderRadius:9,padding:"10px 14px",color:C.white,fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",width:"100%"};

  return (
    <div style={{minHeight:"100vh",background:C.navy}}>
      {/* Header */}
      <div style={{background:C.navyMid,borderBottom:`1px solid ${C.navyLight}`,padding:"12px 20px"}}>
        <div style={{maxWidth:860,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <Logo size={26}/>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            {role==="admin"&&<Badge color={C.orange}>Admin</Badge>}
            {pendingUsers.length>0&&<Badge color={C.red}>⏳ {pendingUsers.length}</Badge>}
            <span style={{color:C.gray400,fontSize:12,maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.email}</span>
            <Btn onClick={onLogout} variant="ghost" size="sm">Sair</Btn>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{background:C.navyMid,borderBottom:`1px solid ${C.navyLight}`}}>
        <div style={{maxWidth:860,margin:"0 auto",display:"flex",gap:0}}>
          {[["pacientes","👥 Pacientes"],["ia","🤖 Sugestão IA"],["ortoflix","🎬 OrtoFlix"]].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)} style={{padding:"12px 20px",border:"none",background:"transparent",color:tab===id?C.orange:C.gray400,fontWeight:tab===id?700:500,fontSize:13,fontFamily:"DM Sans,sans-serif",cursor:"pointer",borderBottom:`2px solid ${tab===id?C.orange:"transparent"}`,transition:"all .2s"}}>{label}</button>
          ))}
        </div>
      </div>

      {tab==="ia"&&<AISuggestion onSelectQ={(qid)=>setAiSelectedQ(qid)}/>}
      {tab==="ortoflix"&&<OrtoFlixTab/>}

      {tab==="pacientes"&&(
        <div style={{maxWidth:860,margin:"0 auto",padding:"20px 16px"}}>
          {/* Stats */}
          <div className="fu" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:12,marginBottom:24}}>
            {[{label:"Pacientes",value:patients.length,icon:"👥",color:C.orange},{label:"Avaliações",value:patients.reduce((s,p)=>s+(p.evals||[]).length,0),icon:"📋",color:"#3B82F6"},{label:"Questionários",value:8,icon:"📊",color:C.green}].map(s=>(
              <div key={s.label} style={{background:C.navyMid,border:`1px solid ${C.navyLight}`,borderRadius:14,padding:18}}>
                <div style={{fontSize:22}}>{s.icon}</div>
                <div style={{fontFamily:"Syne,sans-serif",fontSize:30,fontWeight:800,color:s.color,marginTop:6}}>{s.value}</div>
                <div style={{color:C.gray400,fontSize:12,marginTop:2}}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Menu articulação */}
          <div className="fu2" style={{marginBottom:24}}>
            <h2 style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:16,marginBottom:12}}>Questionários por Articulação</h2>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10}}>
              {JOINTS.map(j=>(
                <div key={j.id} style={{background:C.navyMid,border:`1.5px solid ${j.color}33`,borderRadius:14,padding:16,cursor:"default",transition:"all .2s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=j.color} onMouseLeave={e=>e.currentTarget.style.borderColor=`${j.color}33`}>
                  <div style={{fontSize:24,marginBottom:6}}>{j.icon}</div>
                  <div style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:13,color:j.color,marginBottom:6}}>{j.label}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                    {j.qs.map(qid=><span key={qid} style={{background:`${j.color}22`,color:j.color,borderRadius:999,padding:"2px 8px",fontSize:10,fontWeight:600}}>{QS[qid]?.name}</span>)}

              ))}
            </div>
          </div>

          <div className="fu3">

              <h2 style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:18}}>Pacientes</h2>

            filtered.length===0?<div style={{background:C.navyMid,border:`1px solid ${C.navyLight}`,borderRadius:14,padding:32,textAlign:"center",color:C.gray400}}>{patients.length===0?"Nenhum paciente cadastrado. Clique em + Novo paciente.":"Nenhum resultado."}</div>:
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {filtered.map(p=>(
                <div key={p.id} onClick={()=>setSelectedPatient(p)} style={{background:C.navyMid,border:`1px solid ${C.navyLight}`,borderRadius:14,padding:"14px 18px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",transition:"all .18s",gap:12}} onMouseEnter={e=>{e.currentTarget.style.borderColor=`${C.orange}66`;e.currentTarget.style.transform="translateX(2px)"}} onMouseLeave={e=>{e.currentTarget.style.borderColor=C.navyLight;e.currentTarget.style.transform="translateX(0)"}}>

              </div>

        <Modal title="Novo paciente" onClose={()=>setShowAddModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <input placeholder="Idade" type="number" value={newP.age} onChange={e=>setNewP(p=>({...p,age:e.target.value}))} style={inp}/>
              <select value={newP.gender} onChange={e=>setNewP(p=>({...p,gender:e.target.value}))} style={{...inp,cursor:"pointer"}}><option value="F">Feminino</option><option value="M">Masculino</option></select>
            </div>
            <input placeholder="Condição / diagnóstico" value={newP.condition} onChange={e=>setNewP(p=>({...p,condition:e.target.value}))} style={inp}/>
            <div style={{display:"flex",gap:10,marginTop:4}}>
              <Btn onClick={()=>setShowAddModal(false)} variant="ghost" full>Cancelar</Btn>
              <Btn onClick={addPatient} disabled={!newP.name.trim()} loading={saving} full>Cadastrar paciente</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ─── PENDING SCREEN ────────────────────────────────────────────────────────────
const PendingScreen = ({onBack}) => (
  <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:`radial-gradient(ellipse at 30% 60%,${C.navyLight} 0%,${C.navy} 65%)`,padding:16}}>
    <div className="fu" style={{background:C.navyMid,border:`1px solid ${C.navyLight}`,borderRadius:20,padding:36,width:"100%",maxWidth:400,textAlign:"center"}}>
      <div style={{fontSize:56,marginBottom:16}}>⏳</div>
      <h2 style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:22,marginBottom:12}}>Cadastro em análise</h2>
      <p style={{color:C.gray400,fontSize:14,lineHeight:1.7,marginBottom:24}}>Seu cadastro ainda não foi aprovado. O administrador irá revisar sua solicitação e você receberá um aviso em breve.</p>
      <div style={{background:`${C.yellow}11`,border:`1px solid ${C.yellow}33`,borderRadius:12,padding:16,marginBottom:24}}>
        <p style={{color:C.yellow,fontSize:13,fontWeight:600,marginBottom:4}}>O que fazer agora?</p>
        <p style={{color:C.gray400,fontSize:13,lineHeight:1.6}}>Aguarde o contato do administrador. Tente fazer login novamente após receber a confirmação.</p>
      </div>
      <Btn onClick={onBack} variant="ghost" full>← Voltar ao login</Btn>
      <p style={{color:C.gray400,fontSize:11,marginTop:20}}>Desenvolvido pelo Professor Felipe Cerqueira</p>
    </div>
  </div>
);

// ─── LOGIN ──────────────────────────────────────────────────────────────────────
const Login = ({onLogin}) => {
  const [mode,setMode] = useState("login");
  const [email,setEmail] = useState("");
  const [pass,setPass] = useState("");
  const [name,setName] = useState("");
  const [loading,setLoading] = useState(false);
  const [error,setError] = useState("");

  const errMsg = (code) => ({
    "auth/user-not-found":"E-mail não encontrado.",
    "auth/wrong-password":"Senha incorreta.",
    "auth/invalid-credential":"E-mail ou senha inválidos.",
    "auth/email-already-in-use":"Este e-mail já está cadastrado.",
    "auth/weak-password":"A senha deve ter pelo menos 6 caracteres.",
    "auth/invalid-email":"E-mail inválido.",
  }[code]||"Erro: "+code);

  const handleLogin = async () => {
    if(!email||!pass) return setError("Preencha e-mail e senha.");
    setLoading(true); setError("");
    let cred=null;
    try {
      await waitForFirebase();
      const {signInWithEmailAndPassword}=fbFns();
      cred=await signInWithEmailAndPassword(fbAuth(),email,pass);
    } catch(e){setError(errMsg(e.code));setLoading(false);return;}
    if(cred.user.email===ADMIN_EMAIL){onLogin(cred.user,"admin");setLoading(false);return;}
    try {
      const {doc,getDoc,signOut}=fbFns();
      const snap=await getDoc(doc(fbDb(),"users",cred.user.uid));
      const status=snap.exists()?snap.data().status:"pending";
      if(status!=="approved"){await signOut(fbAuth());onLogin(null,"pending");setLoading(false);return;}
      onLogin(cred.user,"professional");
    } catch(e){try{const{signOut}=fbFns();await signOut(fbAuth());}catch(_){}onLogin(null,"pending");}
    setLoading(false);
  };

  const handleRegister = async () => {
    if(!email||!pass||!name) return setError("Preencha todos os campos.");
    if(pass.length<6) return setError("A senha deve ter pelo menos 6 caracteres.");
    setLoading(true); setError("");
    try {
      await waitForFirebase();
      const {createUserWithEmailAndPassword,doc,setDoc,signOut}=fbFns();
      const cred=await createUserWithEmailAndPassword(fbAuth(),email,pass);
      await setDoc(doc(fbDb(),"users",cred.user.uid),{name,email,role:"professional",status:"pending",createdAt:new Date().toISOString()});
      await signOut(fbAuth());
      setMode("pending_sent"); setEmail(""); setPass(""); setName("");
    } catch(e){setError(errMsg(e.code));}
    setLoading(false);
  };

  const inp = {background:C.navyLight,border:`1.5px solid ${C.navyLight}`,borderRadius:10,padding:"12px 16px",color:C.white,fontSize:14,fontFamily:"DM Sans,sans-serif",width:"100%",outline:"none"};

  if(mode==="pending_sent") return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:`radial-gradient(ellipse at 30% 60%,${C.navyLight} 0%,${C.navy} 65%)`,padding:16}}>
      <div className="fu" style={{background:C.navyMid,border:`1px solid ${C.navyLight}`,borderRadius:20,padding:36,width:"100%",maxWidth:400,textAlign:"center"}}>
        <div style={{fontSize:56,marginBottom:16}}>📬</div>
        <h2 style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:22,marginBottom:12}}>Cadastro enviado!</h2>
        <p style={{color:C.gray400,fontSize:14,lineHeight:1.7,marginBottom:24}}>Seu cadastro foi recebido. Aguarde a aprovação do administrador. Você será notificado quando sua conta for liberada.</p>
        <div style={{background:`${C.orange}11`,border:`1px solid ${C.orange}33`,borderRadius:12,padding:14,marginBottom:24}}>
          <p style={{color:C.orange,fontSize:13}}>⏳ Status: <strong>Aguardando aprovação</strong></p>
        </div>
        <Btn onClick={()=>setMode("login")} variant="ghost" full>← Voltar ao login</Btn>
        <p style={{color:C.gray400,fontSize:11,marginTop:20}}>Desenvolvido pelo Professor Felipe Cerqueira</p>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:`radial-gradient(ellipse at 30% 60%,${C.navyLight} 0%,${C.navy} 65%)`,padding:16}}>
      <div className="fu" style={{background:C.navyMid,border:`1px solid ${C.navyLight}`,borderRadius:20,padding:36,width:"100%",maxWidth:420}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <Logo size={38}/>
          <p style={{color:C.gray400,fontSize:12,marginTop:10}}>Questionários Funcionais em Fisioterapia</p>
        </div>
        {/* OrtoFlix logo */}
        <div style={{textAlign:"center",marginBottom:24,paddingTop:4,paddingBottom:20,borderBottom:`1px solid ${C.navyLight}`}}>
          <img src={ORTOFLIX_LOGO} alt="OrtoFlix" style={{height:28,objectFit:"contain",opacity:.9}}/>
        </div>
        <div style={{display:"flex",gap:6,background:C.navy,borderRadius:11,padding:4,marginBottom:22}}>
          {[["login","Entrar"],["register","Cadastrar"]].map(([v,l])=>(
            <button key={v} onClick={()=>{setMode(v);setError("");}} style={{flex:1,padding:"8px 0",borderRadius:8,border:"none",cursor:"pointer",background:mode===v?C.orange:"transparent",color:mode===v?C.white:C.gray400,fontWeight:600,fontSize:13,fontFamily:"DM Sans,sans-serif",transition:"all .18s"}}>{l}</button>
          ))}
        </div>
        <Alert msg={error}/>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {mode==="register"&&<input style={inp} placeholder="Nome completo" value={name} onChange={e=>setName(e.target.value)}/>}
          <input style={inp} placeholder="E-mail" type="email" value={email} onChange={e=>setEmail(e.target.value)}/>
          <input style={inp} placeholder="Senha" type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(mode==="login"?handleLogin():handleRegister())}/>
          <Btn onClick={mode==="login"?handleLogin:handleRegister} size="lg" full loading={loading} style={{marginTop:4}}>{mode==="login"?"Entrar":"Criar conta"}</Btn>
        </div>
        <p style={{color:C.gray400,fontSize:11,textAlign:"center",marginTop:20}}>Desenvolvido pelo Professor Felipe Cerqueira</p>
      </div>
    </div>
  );
};

// ─── APP ROOT ───────────────────────────────────────────────────────────────────
const App = () => {
  const [user,setUser] = useState(null);
  const [role,setRole] = useState(null);
  const [checking,setChecking] = useState(true);

  useEffect(()=>{
    waitForFirebase().then(()=>{
      const {onAuthStateChanged,signOut,doc,getDoc}=fbFns();
      onAuthStateChanged(fbAuth(),async(u)=>{
        if(!u){setUser(null);setRole(null);setChecking(false);return;}
        if(u.email===ADMIN_EMAIL){setUser(u);setRole("admin");setChecking(false);return;}
        try {
          const snap=await getDoc(doc(fbDb(),"users",u.uid));
          const status=snap.exists()?snap.data().status:"pending";
          if(status==="approved"){setUser(u);setRole("professional");}
          else{await signOut(fbAuth());setUser(null);setRole("pending");}
        } catch(e){await signOut(fbAuth());setUser(null);setRole(null);}
        setChecking(false);
      });
    });
  },[]);

  const handleLogout = async () => {
    const {signOut}=fbFns();
    await signOut(fbAuth());
    setUser(null);setRole(null);
  };

  if(checking) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.navy}}>
      <div style={{textAlign:"center"}}><Logo size={40}/><div className="spinner" style={{margin:"20px auto 0",width:28,height:28}}/></div>
    </div>
  );

  if(role==="pending") return <PendingScreen onBack={()=>setRole(null)}/>;
  return user?<Dashboard user={user} role={role} onLogout={handleLogout}/>:<Login onLogin={(u,r)=>{setUser(u);setRole(r);}}/>;
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
